services:

  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - dokploy-network
    environment:
      DB_HOST: maria_db_app
      DB_USER: root
      DB_PASSWORD: qwert
      DB_DATABASE: tareas

  frontend:
    build:
      context: ./frontend/react-app
    expose:
      - "80"
    networks:
      - dokploy-network
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`crud-task.softapp.ch`)
      - traefik.http.services.app.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true