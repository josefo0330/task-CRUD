
services:
  db:
    image: mysql:8.0
    container_name: tareas-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: qwert
      MYSQL_DATABASE: tareas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_DATABASE: tareas

  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: {}
