
services:

  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - dokploy-network
    environment:
      DB_HOST: ${DB_HOST:-maria_db_app}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-qwert}
      DB_NAME: ${DB_NAME:-tareas}
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`crud-task.softapp.ch`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.middlewares=backend-stripprefix
      - traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api
      - traefik.http.services.backend.loadbalancer.server.port=8081

  frontend:
    build:
      context: ./frontend/react-app
    expose:
      - "5173"
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`crud-task.softapp.ch`)
      - traefik.http.services.app.loadbalancer.server.port=5173

networks:
  dokploy-network:
    external: true
