version: "3.9"

services:

  maria_db_app:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: qwert
      MYSQL_DATABASE: tareas
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - dokploy-network

  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - dokploy-network
    environment:

  frontend:
    build:
      context: ./frontend/react-app
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`crud-task.softapp.ch`)
      - traefik.http.services.app.loadbalancer.server.port=80

volumes:
  mariadb_data:

networks:
  dokploy-network:
    external: true