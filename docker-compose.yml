services:

  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend/react-app
    expose:
      - "80"
    networks:
      - dokploy-network
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`crud-task.softapp.ch`)
      - traefik.http.services.app.loadbalancer.server.port=80
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
networks:
  dokploy-network:
    external: true