
services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always

    environment:
      PMA_HOST: phpmyadmin.softapp.ch
      PMA_PORT: 3306
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.softapp.ch`)"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - phpmyadmin
    ports:
      - "8081:8081"
    environment:
      DB_HOST: phpmyadmin.softapp.ch
      DB_USER: root
      DB_PASSWORD: qwert
      DB_DATABASE: tareas

  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: {}
networks:
  deployment_network:
    external: true