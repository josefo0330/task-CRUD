services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: maria_db_app
      DB_USER: root
      DB_PASSWORD: qwert
      DB_DATABASE: tareas
    networks:
      - dokploy-network   # 👈 CAMBIO AQUÍ

  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - dokploy-network   # 👈 CAMBIO AQUÍ

networks:
  dokploy-network:
    external: true