

services:
  backend:
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - dokploy-network
    environment:

  frontend:
    build:
      context: ./frontend/react-app
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`crud-task.softapp.ch`)
      - traefik.http.services.app.loadbalancer.server.port=80
networks:
  dokploy-network:
    external: true