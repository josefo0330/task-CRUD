
services:
  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_HOST: maria_db_app  # 👈 nombre del servicio
      DB_USER: root
      DB_PASSWORD: qwert
      DB_NAME: tareas

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: