version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: tareas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tareas
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_DATABASE: tareas

  nginx:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data: {}
